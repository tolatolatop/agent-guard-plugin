version: 1

global_gates:
  - Do not write outside allowed_paths.
  - Do not retry identical failing commands without code changes or failure analysis.
  - Do not claim completion unless can-finalize passes.
  - Do not modify .agent/state.json directly; use agent-guard workflow commands to change task state.

protected_paths:
  - .agent/state.json

command_rules:
  complete_step_allowed_from_stages:
    - RED_TEST
    - GREEN_IMPL
    - REVIEW
    - VERIFY

transition_graph_mermaid: |
  flowchart TD
    IDLE --> CLARIFYING
    CLARIFYING --> DESIGNING
    CLARIFYING --> PLANNING
    DESIGNING --> PLANNING
    PLANNING --> RED_TEST
    PLANNING --> GREEN_IMPL
    RED_TEST --> GREEN_IMPL
    RED_TEST --> NEEDS_FAILURE_ANALYSIS
    GREEN_IMPL --> REVIEW
    GREEN_IMPL --> NEEDS_FAILURE_ANALYSIS
    REVIEW --> VERIFY
    REVIEW --> GREEN_IMPL
    VERIFY --> READY_TO_SUMMARIZE
    VERIFY --> NEEDS_FAILURE_ANALYSIS
    READY_TO_SUMMARIZE --> DONE
    NEEDS_FAILURE_ANALYSIS --> RED_TEST
    NEEDS_FAILURE_ANALYSIS --> GREEN_IMPL
    NEEDS_FAILURE_ANALYSIS --> VERIFY
    NEEDS_FAILURE_ANALYSIS --> NEEDS_HUMAN
    NEEDS_HUMAN --> CLARIFYING
    NEEDS_HUMAN --> PLANNING

stages:
  IDLE:
    goal: Load task state and determine the next concrete step.
    allowed_actions:
      - read .agent state
      - inspect plan and job files
      - explore repository directories and files in read-only mode
      - start-task when task_id is unset
    forbidden_actions:
      - modify files before a task is started
      - run implementation or verification work before a task is started
      - claim work is complete
      - skip state initialization
    allowed_paths:
      - .agent/**
    forbidden_paths: []
    allowed_next_stages:
      - CLARIFYING
    transition_rules:
      CLARIFYING:
        display_conditions:
          - task_id must be set
        require_active_task: true
    artifacts_expected: []
    artifacts_required: []
    writable: managed-only

  CLARIFYING:
    goal: Resolve task intent, assumptions, and missing inputs before implementation.
    allowed_actions:
      - clarify requirements
      - inspect repository state
      - capture unresolved risks
    forbidden_actions:
      - start implementation before requirements are clear
    allowed_paths:
      - .agent/**
    forbidden_paths: []
    allowed_next_stages:
      - DESIGNING
      - PLANNING
    transition_rules:
      DESIGNING:
        display_conditions:
          - active task exists
          - needs_human must be false
        require_active_task: true
        forbid_needs_human: true
      PLANNING:
        display_conditions:
          - active task exists
          - caller has clarified requirements
        require_active_task: true
    artifacts_expected: []
    artifacts_required: []
    writable: managed-only

  DESIGNING:
    goal: Write the smallest design needed to guide implementation safely.
    allowed_actions:
      - draft a design note
      - identify artifacts and validation steps
    forbidden_actions:
      - broad implementation before the design is settled
    allowed_paths:
      - .agent/**
      - ./DESIGN.md
    forbidden_paths: []
    allowed_next_stages:
      - PLANNING
    transition_rules:
      PLANNING:
        display_conditions:
          - active task exists
        require_active_task: true
    artifacts_expected:
      - .agent/artifacts/DESIGN.md
      - ./DESIGN.md
    artifacts_required: []
    writable: managed-only

  PLANNING:
    goal: Break work into explicit steps with success conditions and path scope.
    allowed_actions:
      - write or refine plan.yaml
      - set allowed and forbidden paths per step
    forbidden_actions:
      - execute unplanned broad changes
    allowed_paths:
      - .agent/**
      - ./PLAN.md
    forbidden_paths: []
    allowed_next_stages:
      - RED_TEST
      - GREEN_IMPL
    transition_rules:
      RED_TEST:
        display_conditions:
          - step must be selected
          - scope must be known from plan or explicit flags
        require_selected_step: true
        require_scope: true
      GREEN_IMPL:
        display_conditions:
          - step must be selected
          - scope must be known from plan or explicit flags
        require_selected_step: true
        require_scope: true
    artifacts_expected:
      - .agent/plan.yaml
      - .agent/artifacts/PLAN.md
      - ./PLAN.md
    artifacts_required: []
    writable: managed-only

  RED_TEST:
    goal: Create a failing test that proves the missing behavior.
    allowed_actions:
      - write tests
      - run targeted tests
      - save failing logs
    forbidden_actions:
      - write production code
      - claim implementation is complete
    allowed_paths: []
    forbidden_paths:
      - src/**
    allowed_next_stages:
      - GREEN_IMPL
      - NEEDS_FAILURE_ANALYSIS
    transition_rules:
      GREEN_IMPL:
        display_conditions:
          - current red step must be completed with complete-step
        required_command: complete-step
      NEEDS_FAILURE_ANALYSIS:
        display_conditions:
          - unexpected failure requires analysis
    artifacts_expected:
      - .agent/artifacts/red-test.log
    artifacts_required: []

  GREEN_IMPL:
    goal: Implement the smallest code change that makes the targeted test pass.
    allowed_actions:
      - write minimal production code
      - update tests if required
      - run targeted verification
    forbidden_actions:
      - broad refactors
      - unrelated formatting
      - dependency upgrades unless planned
    allowed_paths: []
    forbidden_paths: []
    allowed_next_stages:
      - REVIEW
      - NEEDS_FAILURE_ANALYSIS
    transition_rules:
      REVIEW:
        display_conditions:
          - current impl step must be completed
        require_completed_current_step_on_commands:
          - advance-stage
      NEEDS_FAILURE_ANALYSIS:
        display_conditions:
          - unexpected failure requires analysis
    artifacts_expected:
      - .agent/artifacts/command-failure.log
    artifacts_required: []

  REVIEW:
    goal: Review the diff and capture review evidence without changing code.
    allowed_actions:
      - read diff
      - read files
      - write review artifact
    forbidden_actions:
      - modify source unless review findings create a new implementation step
    allowed_paths:
      - .agent/**
    forbidden_paths: []
    allowed_next_stages:
      - VERIFY
      - GREEN_IMPL
    transition_rules:
      VERIFY:
        display_conditions:
          - "{required_artifacts:REVIEW} must exist"
        require_review_artifacts: true
      GREEN_IMPL:
        display_conditions:
          - review identified follow-up implementation work
    artifacts_expected:
      - .agent/artifacts/review.json
    artifacts_required:
      - .agent/artifacts/review.json
    writable: managed-only

  VERIFY:
    goal: Run verification commands and record final evidence.
    allowed_actions:
      - run verification commands
      - write verification logs
    forbidden_actions:
      - new implementation work unless the state moves to NEEDS_FAILURE_ANALYSIS
    allowed_paths:
      - .agent/artifacts/**
    forbidden_paths: []
    allowed_next_stages:
      - READY_TO_SUMMARIZE
      - NEEDS_FAILURE_ANALYSIS
    transition_rules:
      READY_TO_SUMMARIZE:
        display_conditions:
          - last_verification.exit_code must be 0
          - no running jobs
          - remaining steps must be complete
          - can_finalize enabled only through ready-to-summarize
        required_command: ready-to-summarize
        require_successful_last_verification: true
        require_no_running_jobs: true
        require_empty_remaining_steps: true
      NEEDS_FAILURE_ANALYSIS:
        display_conditions:
          - verification failed
    artifacts_expected:
      - .agent/artifacts/final-verification.log
      - .agent/artifacts/command-failure.log
    artifacts_required: []
    writable: managed-only

  READY_TO_SUMMARIZE:
    goal: Summarize completed work and verification results without further edits.
    allowed_actions:
      - summarize work
      - list changed files
      - report verification commands and results
    forbidden_actions:
      - further code changes
    allowed_paths:
      - .agent/artifacts/summary.md
    forbidden_paths: []
    allowed_next_stages:
      - DONE
    transition_rules:
      DONE:
        display_conditions:
          - use mark-done
          - can-finalize must pass
          - "{required_artifacts:READY_TO_SUMMARIZE} must exist"
        required_command: mark-done
        require_can_finalize: true
    artifacts_expected:
      - .agent/artifacts/summary.md
    artifacts_required:
      - .agent/artifacts/summary.md
    writable: managed-only

  NEEDS_FAILURE_ANALYSIS:
    goal: Stop retry loops and produce evidence-backed failure analysis before changing code again.
    allowed_actions:
      - inspect logs
      - write failure-analysis.md
      - identify minimal fix and next verification command
    forbidden_actions:
      - rerun the same failing command without analysis
      - continue source edits without evidence
    allowed_paths:
      - .agent/artifacts/**
    forbidden_paths: []
    allowed_next_stages:
      - RED_TEST
      - GREEN_IMPL
      - VERIFY
      - NEEDS_HUMAN
    transition_rules:
      RED_TEST:
        display_conditions:
          - "{required_artifacts:NEEDS_FAILURE_ANALYSIS} must exist"
          - next step and scope must be known
        require_failure_analysis_artifacts: true
        require_selected_step: true
        require_scope: true
      GREEN_IMPL:
        display_conditions:
          - "{required_artifacts:NEEDS_FAILURE_ANALYSIS} must exist"
          - next step and scope must be known
        require_failure_analysis_artifacts: true
        require_selected_step: true
        require_scope: true
      VERIFY:
        display_conditions:
          - "{required_artifacts:NEEDS_FAILURE_ANALYSIS} must exist"
        require_failure_analysis_artifacts: true
      NEEDS_HUMAN:
        display_conditions:
          - explicit escalation
    artifacts_expected:
      - .agent/artifacts/failure-analysis.md
    artifacts_required:
      - .agent/artifacts/failure-analysis.md
    writable: managed-only

  NEEDS_HUMAN:
    goal: Escalate blocked or risky work for human review.
    allowed_actions:
      - report blocker
      - request approval
      - pause risky actions
    forbidden_actions:
      - continue sensitive or ambiguous work without approval
    allowed_paths:
      - .agent/**
    forbidden_paths: []
    allowed_next_stages:
      - CLARIFYING
      - PLANNING
    transition_rules:
      CLARIFYING:
        display_conditions:
          - human guidance received
      PLANNING:
        display_conditions:
          - human guidance resolved scope and next step
    artifacts_expected: []
    artifacts_required: []
    writable: managed-only

  DONE:
    goal: Task is complete; preserve state and await the next task.
    allowed_actions:
      - report completion evidence
      - wait for next instruction
    forbidden_actions:
      - resume editing under the completed task
    allowed_paths:
      - .agent/**
    forbidden_paths: []
    allowed_next_stages: []
    artifacts_expected: []
    artifacts_required: []
    writable: managed-only
