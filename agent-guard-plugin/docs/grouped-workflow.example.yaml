workflow:
  id: standard-grouped-example
  title: Standard Grouped Workflow Example
  description: Reference grouped workflow for agent-guard.
  entry: CLARIFYING

globals:
  paths:
    protected:
      - .agent/state.json
    sensitive:
      - .github/**
      - infra/**
      - migrations/**
      - package-lock.json
      - pnpm-lock.yaml
      - yarn.lock
      - poetry.lock
      - Cargo.lock

  failures:
    repeat_threshold: 2
    fingerprint_roots:
      - src
      - tests

  finalization:
    require:
      - no_running_jobs
      - successful_last_verification
      - can_finalize_flag
      - all_plan_steps_terminal
    messages:
      no_running_jobs: running jobs still exist
      successful_last_verification: last_verification.exit_code must be 0
      can_finalize_flag: state.can_finalize is not true
      all_plan_steps_terminal: all plan steps must be done or failed

  wizard:
    start_stages:
      - CLARIFYING
      - PLANNING
      - RED_TEST
      - GREEN_IMPL

  session_start:
    navigator_skill: using-workflow

  install:
    skills:
      match: []
      exclude_match: []

stages:
  IDLE:
    intent:
      goal: Load task state and determine the next concrete step.
    permissions:
      write:
        allow:
          - .agent/**
        deny: []
      actions:
        allow:
          - read .agent state
          - inspect plan and job files
          - explore repository directories and files in read-only mode
          - start-task when task_id is unset
        deny:
          - modify files before a task is started
          - run implementation or verification work before a task is started
          - claim work is complete
          - skip state initialization
      commands:
        complete_step: deny
      handoff:
        human_stop: allow
    transitions:
      to:
        - CLARIFYING
      enter_when:
        - rule: active_task
          display: task_id must be set
    evidence:
      expected: []
      required: []

  CLARIFYING:
    intent:
      goal: Resolve task intent, assumptions, and missing inputs before implementation.
    permissions:
      write:
        allow:
          - .agent/**
        deny: []
      actions:
        allow:
          - clarify requirements
          - inspect repository state
          - capture unresolved risks
        deny:
          - start implementation before requirements are clear
      commands:
        complete_step: deny
      handoff:
        human_stop: allow
    transitions:
      to:
        - DESIGNING
        - PLANNING
      enter_when: []
    evidence:
      expected: []
      required: []

  PLANNING:
    intent:
      goal: Break work into explicit steps with clear success conditions and required evidence.
    permissions:
      write:
        allow: []
        deny: []
      actions:
        allow:
          - write or refine plan.yaml
          - refine the next concrete workflow steps in .agent/plan.yaml
        deny:
          - execute unplanned broad changes
      commands:
        complete_step: deny
      handoff:
        human_stop: allow
    transitions:
      to:
        - RED_TEST
        - GREEN_IMPL
      enter_when:
        - rule: active_task
          display: active task exists
    evidence:
      expected: []
      required: []

  RED_TEST:
    intent:
      goal: Create a failing test that proves the missing behavior.
    permissions:
      write:
        allow:
          - tests/**
        deny:
          - src/**
      actions:
        allow:
          - write tests
          - run targeted tests
          - save failing logs
        deny:
          - write production code
          - claim implementation is complete
      commands:
        complete_step: allow
      handoff:
        human_stop: deny
        deny_message: Current stage does not allow human intervention; continue advancing the task.
    transitions:
      to:
        - GREEN_IMPL
        - NEEDS_FAILURE_ANALYSIS
      enter_when: []
    evidence:
      expected:
        - .agent/artifacts/red-test.log
      required: []

  REVIEW:
    intent:
      goal: Review the diff and capture review evidence without changing code.
    permissions:
      write:
        allow:
          - .agent/artifacts/review.md
        deny: []
      actions:
        allow:
          - read diff
          - read files
          - write review artifact
        deny:
          - modify source unless review findings create a new implementation step
      commands:
        complete_step: allow
      handoff:
        human_stop: deny
        deny_message: Current stage does not allow human intervention; continue advancing the task.
    transitions:
      to:
        - VERIFY
        - GREEN_IMPL
      enter_when: []
    evidence:
      expected: []
      required:
        - .agent/artifacts/review.md

  NEEDS_FAILURE_ANALYSIS:
    intent:
      goal: Explain repeated or blocked failures before work resumes.
    permissions:
      write:
        allow:
          - .agent/artifacts/failure-analysis.md
        deny: []
      actions:
        allow:
          - summarize repeated failures
          - explain why the prior attempt failed
          - record the next change in approach
        deny:
          - retry the same fix without meaningful change
      commands:
        complete_step: deny
      handoff:
        human_stop: allow
    transitions:
      to:
        - RED_TEST
        - GREEN_IMPL
        - NEEDS_HUMAN
      enter_when: []
    evidence:
      expected: []
      required:
        - path: .agent/artifacts/failure-analysis.md
          matches: '^## Failure Summary'
          display: failure-analysis.md must start with the Failure Summary section.
