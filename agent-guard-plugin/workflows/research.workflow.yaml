version: 2

workflow:
  id: research
  title: Research Workflow
  description: Workflow for scoped repository research, evidence gathering, and structured findings.
  entry: QUESTIONING

global_gates:
  - Do not write outside stage permissions.
  - Do not retry identical failing commands without code changes or failure analysis.
  - Do not claim completion unless can-finalize passes.
  - Do not modify .agent/state.json directly; use agent-guard workflow commands to change task state.

globals:
  protected:
    - .agent/state.json

  sensitive:
    - .github/**
    - infra/**
    - migrations/**
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - poetry.lock
    - Cargo.lock

  failures:
    repeat_threshold: 2
    fingerprint_roots:
      - docs
      - notes
      - reports

  finalize:
    require:
      - rule: no_running_jobs
      - rule: can_finalize_flag
      - rule: all_plan_steps_terminal
    messages:
      no_running_jobs: running jobs still exist
      can_finalize_flag: state.can_finalize is not true
      all_plan_steps_terminal: all plan steps must be done or failed

  wizard:
    start_stages:
      - QUESTIONING
      - DISCOVER
      - ANALYZE

  session_start:
    navigator_skill: using-workflow

  install:
    skills:
      match: []
      exclude_match: []

stages:
  IDLE:
    goal: Load task state and determine the next concrete research step.
    plan: deny
    allow:
      write:
        - .agent/**
      actions:
        - read .agent state
        - inspect repository in read-only mode
        - start-task when task_id is unset
      stop: true
      human: true
    deny:
      write: []
      actions:
        - modify repository files before a task is started
        - claim work is complete
    enter: []
    exit: []
    expect: []
    next:
      - QUESTIONING

  QUESTIONING:
    goal: Frame the research question, scope, assumptions, and desired output.
    plan: deny
    allow:
      write:
        - .agent/**
      actions:
        - inspect repository state
        - clarify research constraints
        - capture initial assumptions
      stop: true
      human: true
    deny:
      write: []
      actions:
        - broad evidence gathering before the question is framed
    enter: []
    exit: []
    expect: []
    next:
      - DISCOVER
      - OUTLINE

  OUTLINE:
    goal: Break the research task into explicit evidence-gathering and analysis steps.
    plan: create
    allow:
      write: []
      actions:
        - write or refine plan.yaml
        - identify evidence targets and deliverables
      stop: true
      human: true
    deny:
      write: []
      actions:
        - broad research without a plan
    enter: []
    exit: []
    expect: []
    next:
      - DISCOVER

  DISCOVER:
    goal: Gather source material, repository evidence, and relevant references.
    plan: advance
    allow:
      write:
        - docs/**
        - notes/**
        - reports/**
        - .agent/artifacts/research-brief.md
      actions:
        - inspect source files
        - collect evidence
        - write research notes
      stop: false
      human: false
    deny:
      write:
        - src/**
        - tests/**
      actions:
        - implement product changes
        - claim conclusions without evidence
    enter: []
    exit:
      - .agent/artifacts/research-brief.md
    expect: []
    next:
      - ANALYZE
      - NEEDS_FAILURE_ANALYSIS

  ANALYZE:
    goal: Synthesize gathered evidence into findings, tradeoffs, and recommendations.
    plan: advance
    allow:
      write:
        - docs/**
        - notes/**
        - reports/**
        - .agent/artifacts/analysis.md
      actions:
        - compare findings
        - write analysis
        - revise conclusions
      stop: false
      human: false
    deny:
      write:
        - src/**
        - tests/**
      actions:
        - modify implementation code
        - skip evidence synthesis
    enter: []
    exit:
      - .agent/artifacts/analysis.md
    expect: []
    next:
      - VALIDATE
      - DISCOVER
      - NEEDS_FAILURE_ANALYSIS

  VALIDATE:
    goal: Check that the findings are supported, complete, and ready to hand off.
    plan: advance
    allow:
      write:
        - .agent/artifacts/final-verification.log
        - .agent/artifacts/review.md
      actions:
        - run validation commands
        - record verification notes
        - challenge unsupported claims
      stop: false
      human: true
    deny:
      write:
        - src/**
        - tests/**
      actions:
        - start a new research track without returning to DISCOVER or ANALYZE
    enter: []
    exit:
      - .agent/artifacts/final-verification.log
    expect:
      - .agent/artifacts/review.md
    next:
      - READY_TO_DELIVER
      - DISCOVER
      - ANALYZE
      - NEEDS_FAILURE_ANALYSIS

  READY_TO_DELIVER:
    goal: Final checks are satisfied and the research deliverable is ready to close.
    plan: complete
    allow:
      write:
        - .agent/artifacts/summary.md
      actions:
        - finalize summary
        - prepare final handoff
      stop: true
      human: true
    deny:
      write:
        - src/**
        - tests/**
      actions:
        - start new research work
    enter:
      - rule: required_command
        value: ready-to-summarize
        display: use ready-to-summarize
    exit:
      - .agent/artifacts/summary.md
    expect: []
    next:
      - DONE

  NEEDS_FAILURE_ANALYSIS:
    goal: Analyze blocking failures before resuming research work.
    plan: follow
    allow:
      write:
        - .agent/artifacts/failure-analysis.md
        - .agent/plan.yaml
      actions:
        - write failure analysis
        - revise the research plan
      stop: true
      human: true
    deny:
      write:
        - src/**
        - tests/**
      actions:
        - retry blindly
        - claim the task is complete
    enter: []
    exit:
      - path: .agent/artifacts/failure-analysis.md
        matches: "^## Failure Summary"
        display: failure-analysis.md must start with the Failure Summary section.
    expect: []
    next:
      - DISCOVER
      - ANALYZE
      - VALIDATE

  DONE:
    goal: Research task is complete.
    plan: complete
    final: true
    allow:
      write:
        - .agent/**
      actions:
        - inspect task state
        - archive task state
      stop: true
      human: true
    deny:
      write: []
      actions:
        - resume normal execution
    enter:
      - rule: required_command
        value: mark-done
        display: use mark-done
      - rule: can_finalize_passes
        display: can-finalize must pass
    exit: []
    expect: []
    next: []
